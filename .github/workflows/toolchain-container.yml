name: Publish toolchain container

on:
  push:
    branches:
      - main
    paths:
      - .toolchain/Dockerfile
  workflow_dispatch:

jobs:
  check-tag:
    runs-on: ubuntu-24.04
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Clone Github Repo Action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute toolchain container tag
        id: tag
        run: |
          TAG=$(sha256sum .toolchain/Dockerfile | cut -c1-16)
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists in GHCR
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ env.TAG }}"
          GHCR_TOKEN=$(curl -s \
            -H "Authorization: Bearer $(echo -n "$GITHUB_TOKEN" | base64 -w0)" \
            "https://ghcr.io/token?scope=repository:riscv/udb-toolchain:pull" \
            | jq -r .token)
          GHCR_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${GHCR_TOKEN}" \
            "https://ghcr.io/v2/riscv/udb-toolchain/manifests/${TAG}")
          if [ "$GHCR_STATUS" = "200" ]; then
            echo "Toolchain container tag ${TAG} already exists in GHCR - skipping build."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Toolchain container tag ${TAG} not found in GHCR - proceeding with build."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build-toolchain-container:
    needs: check-tag
    if: needs.check-tag.outputs.exists != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
            artifact: toolchain-image-amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
            artifact: toolchain-image-arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Clone Github Repo Action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute toolchain container tag
        run: |
          TAG=$(sha256sum .toolchain/Dockerfile | cut -c1-16)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and export to tarball
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          file: ./.toolchain/Dockerfile
          context: ./.toolchain
          platforms: ${{ matrix.platform }}
          push: false
          tags: ghcr.io/riscv/udb-toolchain:${{ env.TAG }}
          outputs: type=docker,dest=${{ runner.temp }}/toolchain-image.tar
          cache-from: type=gha,scope=toolchain
          cache-to: type=gha,scope=toolchain,mode=max

      - name: Upload image tarball
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ runner.temp }}/toolchain-image.tar
          if-no-files-found: error
          retention-days: 1

  merge-toolchain-container:
    runs-on: ubuntu-24.04
    needs:
      - check-tag
      - build-toolchain-container
    if: needs.check-tag.outputs.exists != 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone Github Repo Action
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Compute toolchain container tag
        run: |
          TAG=$(sha256sum .toolchain/Dockerfile | cut -c1-16)
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Download amd64 image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolchain-image-amd64
          path: ${{ runner.temp }}/amd64

      - name: Download arm64 image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: toolchain-image-arm64
          path: ${{ runner.temp }}/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Load, retag, and push platform images
        run: |
          TAG="${{ env.TAG }}"

          docker load --input ${{ runner.temp }}/amd64/toolchain-image.tar
          docker tag ghcr.io/riscv/udb-toolchain:${TAG} ghcr.io/riscv/udb-toolchain:${TAG}-amd64

          docker load --input ${{ runner.temp }}/arm64/toolchain-image.tar
          docker tag ghcr.io/riscv/udb-toolchain:${TAG} ghcr.io/riscv/udb-toolchain:${TAG}-arm64

          docker push ghcr.io/riscv/udb-toolchain:${TAG}-amd64
          docker push ghcr.io/riscv/udb-toolchain:${TAG}-arm64

      - name: Create and push multi-platform manifest to GHCR
        run: |
          TAG="${{ env.TAG }}"
          docker buildx imagetools create \
            --tag ghcr.io/riscv/udb-toolchain:${TAG} \
            ghcr.io/riscv/udb-toolchain:${TAG}-amd64 \
            ghcr.io/riscv/udb-toolchain:${TAG}-arm64

      - name: Inspect GHCR image
        run: docker buildx imagetools inspect ghcr.io/riscv/udb-toolchain:${{ env.TAG }}

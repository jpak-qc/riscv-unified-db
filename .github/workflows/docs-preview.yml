name: Docs Preview
# TODO: This workflow deploys to a fork preview (dhower-qc.github.io) on every push to
# doc_next. It is temporary — once the new docs site goes live on the upstream riscv org,
# this workflow should be updated to trigger on the main branch and deploy to the riscv
# org GitHub Pages instead.
on:
  push:
    branches: [doc_next]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "docs-preview"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Install Node dependencies
        run: npm ci

      - name: Build Docusaurus site
        env:
          DOCUSAURUS_URL: https://dhower-qc.github.io
          DOCUSAURUS_BASE_URL: /riscv-unified-db/
        run: npm run build --workspace=doc

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: doc/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

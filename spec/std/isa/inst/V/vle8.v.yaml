# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vle8.v
long_name: Vector 8-bit unit-stride load
description: |
  Loads 8-bit elements from memory starting at address in xs1 register, using vector mask vm, and stores results in vector register vd. The effective element width is 8 bits regardless of SEW setting. Supports vector masking and follows vector tail policy.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, (xs1), vm
encoding:
  match: 000000-00000-----000-----0000111
  variables:
    - name: vm
      location: 25-25
    - name: xs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
  check_v_ok_vtype($encoding);
  XReg virtual_address = X[xs1];

  for (U32 i = CSR[vstart].VALUE; i < CSR[vl].VALUE; i++) {
    if (v_mask_elem_active?(vm, i)) {
      # EEW=8 fixed (log2_eew=3), regardless of SEW
      v_elem_write(vd, i, 3, {120'b0, read_memory(8, virtual_address + i, $encoding)[7:0]});
    }
  }
  CSR[vstart].VALUE = 0;
  mark_v_state_dirty();

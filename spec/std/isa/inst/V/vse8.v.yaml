# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vse8.v
long_name: Vector 8-bit unit-stride store
description: |
  Stores 8-bit elements from vector register vs3 to memory starting at address in xs1 register, using vector mask vm. The effective element width is 8 bits regardless of SEW setting.
definedBy:
  extension:
    name: Zvl32b
assembly: vs3, (xs1), vm
encoding:
  match: 000000-00000-----000-----0100111
  variables:
    - name: vm
      location: 25-25
    - name: xs1
      location: 19-15
    - name: vs3
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: false
operation(): |
  check_v_ok_vtype($encoding);
  XReg virtual_address = X[xs1];

  for (U32 i = CSR[vstart].VALUE; i < CSR[vl].VALUE; i++) {
    if (v_mask_elem_active?(vm, i)) {
      # EEW=8 fixed (log2_eew=3), regardless of SEW
      write_memory(8, virtual_address + i, v_elem_read(vs3, i, 3)[7:0], $encoding);
    }
  }
  CSR[vstart].VALUE = 0;
  mark_v_state_dirty();

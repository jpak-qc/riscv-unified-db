# yaml-language-server: $schema=../../../../schemas/inst_schema.json

$schema: "inst_schema.json#"
kind: instruction
name: vadd.vv
long_name: Vector-vector integer addition
description: |
  Add source vector register groups from vs1 and vs2 according to mask vm and store results in vd.
definedBy:
  extension:
    name: Zvl32b
assembly: vd, vs2, vs1, vm
encoding:
  match: 000000-----------000-----1010111
  variables:
    - name: vm
      location: 25-25
    - name: vs2
      location: 24-20
    - name: vs1
      location: 19-15
    - name: vd
      location: 11-7
access:
  s: always
  u: always
  vs: always
  vu: always
data_independent_timing: true
operation(): |
  check_v_ok_vtype($encoding);
  VectorState state = vector_state();

  for (U32 i = CSR[vstart].VALUE; i < CSR[vl].VALUE; i++) {
    if (v_mask_elem_active?(vm, i)) {
      Bits<128> a = v_elem_read(vs2, i, state.log2_sew);
      Bits<128> b = v_elem_read(vs1, i, state.log2_sew);
      v_elem_write(vd, i, state.log2_sew, a + b);
    }
  }

  CSR[vstart].VALUE = 0;
  mark_v_state_dirty();
